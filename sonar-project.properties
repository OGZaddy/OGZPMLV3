# SonarQube Scanner Configuration
sonar.projectKey=ogzpmlv2
sonar.projectName=OGZ Prime ML V2
sonar.projectVersion=1.0

# Source
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Server
sonar.host.url=http://localhost:9000

# Exclusions (don't scan these)
sonar.exclusions=node_modules/**,logs/**,*.log,coverage/**,dist/**,build/**,.git/**,ogz-meta/sessions/**,ogz-meta/ledger/**

# JavaScript/TypeScript settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Token - set via environment variable SONAR_TOKEN or pass with -Dsonar.token=xxx
# sonar.token=YOUR_TOKEN_HERE
